# ResortsLite - Legacy Configuration
# VIOLATION cr-java-0021: Hardcoded infrastructure values in properties file
spring.application.name=ResortsLite

# VIOLATION czr-port-001 [Software Portability]: Fixed port prevents dynamic assignment by ECS/EKS
server.port=${SERVER_PORT:8080}

# VIOLATION cr-java-0021 [Cloud Compatibility / Mandatory]: Hardcoded DB hostname and credentials.
# Must be externalised to AWS Parameter Store or Secrets Manager for cloud deployment.
spring.datasource.url=jdbc:h2:mem:resortdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# VIOLATION cr-java-0021 [Cloud Compatibility / Mandatory]: Hardcoded internal service endpoints.
# These hostnames are non-routable in cloud VPC environments without manual DNS configuration.
app.payment.endpoint=${PAYMENT_ENDPOINT:http://payment-svc.internal:9090/charge}
app.inventory.endpoint=${INVENTORY_ENDPOINT:http://inventory-svc.internal:8081/rooms}
app.notification.endpoint=${NOTIFICATION_ENDPOINT:http://notify.internal:7070/send}

# Spring Session Redis Configuration (Memorystore for Redis)
spring.session.store-type=redis
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.session.redis.namespace=resortslite:session

# Spring Cache Configuration with Redis
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.cache.redis.cache-null-values=false

# Google Cloud Storage Configuration
gcs.bucket.name=${GCS_BUCKET_NAME:resortslite-reports}
gcs.project.id=${GCP_PROJECT_ID:}

# Health Check Endpoint Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.redis.enabled=true

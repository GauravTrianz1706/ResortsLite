# ResortsLite - Containerized Configuration
spring.application.name=ResortsLite

# Server port - externalized for container environments
server.port=${SERVER_PORT:8080}

# Database configuration - externalized for cloud deployment
spring.datasource.url=${DB_URL:jdbc:h2:mem:resortdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Service endpoints - externalized for Kubernetes service discovery
app.payment.endpoint=${PAYMENT_SERVICE_URL:http://payment-svc:9090/charge}
app.inventory.endpoint=${INVENTORY_SERVICE_URL:http://inventory-svc:8081/rooms}
app.notification.endpoint=${NOTIFICATION_SERVICE_URL:http://notify-svc:7070/send}

# Spring Session Redis configuration for distributed session management
spring.session.store-type=redis
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.session.redis.namespace=resortslite:session

# Redis cache configuration for distributed caching
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.cache.redis.cache-null-values=false

# Google Cloud Storage configuration
spring.cloud.gcp.storage.project-id=${GCP_PROJECT_ID:}
spring.cloud.gcp.storage.credentials.location=${GCP_CREDENTIALS_PATH:}
gcs.bucket.name=${GCS_BUCKET_NAME:resortslite-reports}

# File storage paths - externalized for container environments
app.report.base-path=${REPORT_BASE_PATH:/tmp/reports}
app.backup.path=${BACKUP_PATH:/tmp/backups}

# Health check endpoint configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.redis.enabled=true

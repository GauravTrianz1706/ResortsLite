# ResortsLite - Containerized Configuration
spring.application.name=ResortsLite

# Dynamic port binding for container environments (ECS/EKS)
server.port=${SERVER_PORT:8080}

# Database configuration using environment variables
spring.datasource.url=${DB_URL:jdbc:h2:mem:resortdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# External service endpoints using environment variables
app.payment.endpoint=${PAYMENT_ENDPOINT:http://payment-svc.internal:9090/charge}
app.inventory.endpoint=${INVENTORY_ENDPOINT:http://inventory-svc.internal:8081/rooms}
app.notification.endpoint=${NOTIFICATION_ENDPOINT:http://notify.internal:7070/send}

# Spring Session with Redis for distributed session management
spring.session.store-type=redis
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.session.redis.namespace=resortslite:session

# AWS S3 Configuration for file storage
aws.s3.bucket.name=${S3_BUCKET_NAME:resortslite-reports}
aws.region=${AWS_REGION:us-east-1}

# Spring Boot Actuator health check endpoint
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.redis.enabled=true

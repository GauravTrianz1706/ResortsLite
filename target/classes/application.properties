# ResortsLite - Containerized Configuration
spring.application.name=ResortsLite

# Server configuration - externalized for container deployment
server.port=${SERVER_PORT:8080}

# Database configuration - externalized for cloud deployment
spring.datasource.url=${DB_URL:jdbc:h2:mem:resortdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Redis configuration for distributed session and cache
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.session.store-type=redis

# AWS Configuration
aws.region=${AWS_REGION:us-east-1}
aws.s3.bucket.reports=${S3_REPORTS_BUCKET:resort-reports-bucket}
aws.s3.bucket.backups=${S3_BACKUPS_BUCKET:resort-backups-bucket}

# Service endpoints - externalized for microservices architecture
payment.api.url=${PAYMENT_SERVICE_URL:http://payment-service:9090/payments/charge}
app.inventory.endpoint=${INVENTORY_SERVICE_URL:http://inventory-service:8081/rooms}
app.notification.endpoint=${NOTIFICATION_SERVICE_URL:http://notification-service:7070/send}

# Actuator configuration for health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.redis.enabled=true

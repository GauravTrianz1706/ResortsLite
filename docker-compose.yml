version: '3.8'

services:
  resortslite:
    build:
      context: .
      dockerfile: Dockerfile
    image: resortslite:latest
    container_name: resortslite-app
    ports:
      - "8080:8080"
    environment:
      # Server configuration
      - SERVER_PORT=8080
      
      # Database configuration (H2 in-memory for local development)
      - DB_URL=jdbc:h2:mem:resortdb;DB_CLOSE_DELAY=-1
      - DB_USERNAME=sa
      - DB_PASSWORD=
      
      # Redis configuration (connect to external Redis)
      - REDIS_HOST=${REDIS_HOST:-localhost}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      
      # External service endpoints (configure as needed)
      - PAYMENT_SERVICE_URL=${PAYMENT_SERVICE_URL:-http://payment-svc:9090/charge}
      - INVENTORY_SERVICE_URL=${INVENTORY_SERVICE_URL:-http://inventory-svc:8081/rooms}
      - NOTIFICATION_SERVICE_URL=${NOTIFICATION_SERVICE_URL:-http://notify-svc:7070/send}
      
      # Google Cloud Storage configuration
      - GCP_PROJECT_ID=${GCP_PROJECT_ID:-}
      - GCP_CREDENTIALS_PATH=${GCP_CREDENTIALS_PATH:-}
      - GCS_BUCKET_NAME=${GCS_BUCKET_NAME:-resortslite-reports}
      
      # File storage paths
      - REPORT_BASE_PATH=/tmp/reports
      - BACKUP_PATH=/tmp/backups
      
      # Spring profile
      - SPRING_PROFILES_ACTIVE=docker
    volumes:
      - ./config:/app/config
      - reports-data:/tmp/reports
      - backup-data:/tmp/backups
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  app-network:
    driver: bridge

volumes:
  reports-data:
  backup-data:

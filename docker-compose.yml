version: '3.8'

services:
  resortslite:
    build:
      context: .
      dockerfile: Dockerfile
    image: resortslite:latest
    container_name: resortslite-app
    ports:
      - "8080:8080"
    environment:
      # Server Configuration
      - SERVER_PORT=8080
      
      # Database Configuration (H2 in-memory)
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:resortdb;DB_CLOSE_DELAY=-1
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=
      
      # Redis Configuration (External - provide connection details)
      - REDIS_HOST=${REDIS_HOST:-redis.example.com}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      
      # Google Cloud Storage Configuration
      - GCS_BUCKET_NAME=${GCS_BUCKET_NAME:-resortslite-reports}
      - GCP_PROJECT_ID=${GCP_PROJECT_ID:-your-gcp-project}
      
      # External Service Endpoints
      - PAYMENT_ENDPOINT=${PAYMENT_ENDPOINT:-http://payment-svc:9090/charge}
      - INVENTORY_ENDPOINT=${INVENTORY_ENDPOINT:-http://inventory-svc:8081/rooms}
      - NOTIFICATION_ENDPOINT=${NOTIFICATION_ENDPOINT:-http://notify-svc:7070/send}
      
      # Spring Configuration
      - SPRING_PROFILES_ACTIVE=docker
      
      # JVM Options
      - JAVA_OPTS=-Xmx512m -Xms256m -XX:+UseContainerSupport
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  app-network:
    driver: bridge

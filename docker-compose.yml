version: '3.8'

services:
  resortslite:
    build:
      context: .
      dockerfile: Dockerfile
    image: resortslite:latest
    container_name: resortslite-app
    ports:
      - "8080:8080"
    environment:
      # Application Configuration
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=docker
      
      # Database Configuration (H2 in-memory for local dev)
      - DB_URL=jdbc:h2:mem:resortdb;DB_CLOSE_DELAY=-1
      - DB_USERNAME=sa
      - DB_PASSWORD=
      
      # External Service Endpoints (configure as needed)
      - PAYMENT_ENDPOINT=http://payment-svc.internal:9090/charge
      - INVENTORY_ENDPOINT=http://inventory-svc.internal:8081/rooms
      - NOTIFICATION_ENDPOINT=http://notify.internal:7070/send
      
      # Redis Configuration (provide external Redis connection)
      - REDIS_HOST=redis.example.com
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      
      # AWS S3 Configuration
      - S3_BUCKET_NAME=resortslite-reports
      - AWS_REGION=us-east-1
      
      # JVM Options
      - JAVA_OPTS=-Xmx512m -Xms256m -XX:+UseContainerSupport
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  app-network:
    driver: bridge

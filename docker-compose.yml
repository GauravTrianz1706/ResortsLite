version: '3.8'

services:
  resortslite-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: resortslite:latest
    container_name: resortslite-app
    ports:
      - "8080:8080"
    environment:
      # Server configuration
      - SERVER_PORT=8080
      
      # Database configuration (H2 in-memory for local dev)
      - DB_URL=jdbc:h2:mem:resortdb;DB_CLOSE_DELAY=-1
      - DB_USERNAME=sa
      - DB_PASSWORD=
      
      # Redis configuration (connect to external Redis)
      - REDIS_HOST=${REDIS_HOST:-localhost}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      
      # AWS Configuration
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_REPORTS_BUCKET=${S3_REPORTS_BUCKET:-resort-reports-bucket}
      - S3_BACKUPS_BUCKET=${S3_BACKUPS_BUCKET:-resort-backups-bucket}
      
      # External service endpoints
      - PAYMENT_SERVICE_URL=${PAYMENT_SERVICE_URL:-http://payment-service:9090/payments/charge}
      - INVENTORY_SERVICE_URL=${INVENTORY_SERVICE_URL:-http://inventory-service:8081/rooms}
      - NOTIFICATION_SERVICE_URL=${NOTIFICATION_SERVICE_URL:-http://notification-service:7070/send}
      
      # JVM options
      - JAVA_OPTS=-Xmx512m -Xms256m -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0
      
      # Spring profile
      - SPRING_PROFILES_ACTIVE=docker
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config
    networks:
      - resortslite-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  resortslite-network:
    driver: bridge

volumes:
  logs:
  config:

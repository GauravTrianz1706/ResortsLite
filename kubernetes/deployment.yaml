apiVersion: apps/v1
kind: Deployment
metadata:
  name: resortslite
  namespace: resortslite
  labels:
    app: resortslite
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resortslite
  template:
    metadata:
      labels:
        app: resortslite
        version: v1
    spec:
      containers:
      - name: resortslite
        image: {{IMAGE_URI}}
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        # Server Configuration
        - name: SERVER_PORT
          value: "8080"
        
        # Database Configuration (H2 in-memory)
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:h2:mem:resortdb;DB_CLOSE_DELAY=-1"
        - name: SPRING_DATASOURCE_USERNAME
          value: "sa"
        - name: SPRING_DATASOURCE_PASSWORD
          value: ""
        
        # Redis Configuration (External service)
        - name: REDIS_HOST
          value: "{{REDIS_HOST}}"
        - name: REDIS_PORT
          value: "{{REDIS_PORT}}"
        - name: REDIS_PASSWORD
          value: "{{REDIS_PASSWORD}}"
        
        # Google Cloud Storage Configuration
        - name: GCS_BUCKET_NAME
          value: "{{GCS_BUCKET_NAME}}"
        - name: GCP_PROJECT_ID
          value: "{{GCP_PROJECT_ID}}"
        
        # External Service Endpoints
        - name: PAYMENT_ENDPOINT
          value: "{{PAYMENT_ENDPOINT}}"
        - name: INVENTORY_ENDPOINT
          value: "{{INVENTORY_ENDPOINT}}"
        - name: NOTIFICATION_ENDPOINT
          value: "{{NOTIFICATION_ENDPOINT}}"
        
        # Spring Configuration
        - name: SPRING_PROFILES_ACTIVE
          value: "docker"
        
        # JVM Options
        - name: JAVA_OPTS
          value: "-Xmx512m -Xms256m -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
        
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 90
          periodSeconds: 30
          timeoutSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
      
      restartPolicy: Always

apiVersion: apps/v1
kind: Deployment
metadata:
  name: resortslite
  namespace: resortslite
  labels:
    app: resortslite
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resortslite
  template:
    metadata:
      labels:
        app: resortslite
        version: v1
    spec:
      containers:
      - name: resortslite
        image: {{IMAGE_URI}}
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        # Application Configuration
        - name: SERVER_PORT
          value: "8080"
        - name: SPRING_PROFILES_ACTIVE
          value: "production"
        
        # Database Configuration
        - name: DB_URL
          value: "{{DB_URL}}"
        - name: DB_USERNAME
          value: "{{DB_USERNAME}}"
        - name: DB_PASSWORD
          value: "{{DB_PASSWORD}}"
        
        # External Service Endpoints
        - name: PAYMENT_ENDPOINT
          value: "{{PAYMENT_ENDPOINT}}"
        - name: INVENTORY_ENDPOINT
          value: "{{INVENTORY_ENDPOINT}}"
        - name: NOTIFICATION_ENDPOINT
          value: "{{NOTIFICATION_ENDPOINT}}"
        
        # Redis Configuration
        - name: REDIS_HOST
          value: "{{REDIS_HOST}}"
        - name: REDIS_PORT
          value: "{{REDIS_PORT}}"
        - name: REDIS_PASSWORD
          value: "{{REDIS_PASSWORD}}"
        
        # AWS S3 Configuration
        - name: S3_BUCKET_NAME
          value: "{{S3_BUCKET_NAME}}"
        - name: AWS_REGION
          value: "{{AWS_REGION}}"
        
        # JVM Options
        - name: JAVA_OPTS
          value: "-Xmx512m -Xms256m -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
        
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      
      restartPolicy: Always

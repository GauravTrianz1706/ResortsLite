apiVersion: apps/v1
kind: Deployment
metadata:
  name: resortslite
  namespace: resortslite
  labels:
    app: resortslite
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resortslite
  template:
    metadata:
      labels:
        app: resortslite
        version: v1
    spec:
      containers:
      - name: resortslite
        image: {{IMAGE_URI}}
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        # Server configuration
        - name: SERVER_PORT
          value: "8080"
        
        # Database configuration
        - name: DB_URL
          value: {{DB_URL}}
        - name: DB_USERNAME
          value: {{DB_USERNAME}}
        - name: DB_PASSWORD
          value: {{DB_PASSWORD}}
        
        # Redis configuration
        - name: REDIS_HOST
          value: {{REDIS_HOST}}
        - name: REDIS_PORT
          value: {{REDIS_PORT}}
        - name: REDIS_PASSWORD
          value: {{REDIS_PASSWORD}}
        
        # External service endpoints
        - name: PAYMENT_SERVICE_URL
          value: {{PAYMENT_SERVICE_URL}}
        - name: INVENTORY_SERVICE_URL
          value: {{INVENTORY_SERVICE_URL}}
        - name: NOTIFICATION_SERVICE_URL
          value: {{NOTIFICATION_SERVICE_URL}}
        
        # Google Cloud Storage configuration
        - name: GCP_PROJECT_ID
          value: {{GCP_PROJECT_ID}}
        - name: GCS_BUCKET_NAME
          value: {{GCS_BUCKET_NAME}}
        
        # File storage paths
        - name: REPORT_BASE_PATH
          value: "/tmp/reports"
        - name: BACKUP_PATH
          value: "/tmp/backups"
        
        # Spring profile
        - name: SPRING_PROFILES_ACTIVE
          value: "docker"
        
        # JVM options
        - name: JAVA_OPTS
          value: "-Xmx512m -Xms256m -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
        
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        volumeMounts:
        - name: reports-volume
          mountPath: /tmp/reports
        - name: backup-volume
          mountPath: /tmp/backups
      
      volumes:
      - name: reports-volume
        emptyDir: {}
      - name: backup-volume
        emptyDir: {}

# ResortsLite - GCP Cloud Deployment Configuration Template
# Copy this file and set appropriate values for your GCP environment

# Application Configuration
PORT=8080
SPRING_PROFILES_ACTIVE=gcp

# Database Configuration (Cloud SQL or external database)
DATABASE_URL=jdbc:postgresql://CLOUD_SQL_INSTANCE_IP:5432/resortdb
DATABASE_USERNAME=resortapp
DATABASE_PASSWORD=${sm://projects/PROJECT_ID/secrets/db-password/versions/latest}

# Google Cloud Storage Configuration
GCS_BUCKET_NAME=resorts-lite-reports-prod
GCP_PROJECT_ID=your-gcp-project-id

# Redis Configuration (Memorystore for Redis)
REDIS_HOST=10.0.0.3
REDIS_PORT=6379
REDIS_PASSWORD=${sm://projects/PROJECT_ID/secrets/redis-password/versions/latest}
REDIS_SSL=true

# External Service Endpoints
PAYMENT_SERVICE_URL=https://payment-api.example.com/charge
INVENTORY_SERVICE_URL=https://inventory-api.example.com/rooms
NOTIFICATION_SERVICE_URL=https://notification-api.example.com/send

# Secret Manager Configuration
SECRET_MANAGER_ENABLED=true

# H2 Console (disable in production)
H2_CONSOLE_ENABLED=false

# ResortsLite - Cloud-Ready Configuration for AWS
spring.application.name=ResortsLite

# Server Port - Externalized for cloud environments (ECS, EKS, Elastic Beanstalk)
# Can be overridden by environment variable SERVER_PORT
server.port=${SERVER_PORT:8080}

# Database Configuration - Externalized
# Use AWS Secrets Manager for production credentials
spring.datasource.url=${DB_URL:jdbc:h2:mem:resortdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# H2 Console (disable in production)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# Redis Configuration for Session Management (Amazon ElastiCache)
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.ssl=${REDIS_SSL:false}
spring.redis.timeout=2000ms

# Spring Session Configuration
spring.session.store-type=redis
spring.session.redis.namespace=resortslite:session
spring.session.timeout=30m

# AWS Configuration
aws.region=${AWS_REGION:us-east-1}
aws.s3.bucket.reports=${S3_BUCKET_REPORTS:resort-reports-bucket}
aws.secretsmanager.secret.name=${DB_SECRET_NAME:resortslite/db/credentials}

# Application Endpoints - Externalized for cloud service discovery
# These should be retrieved from AWS Systems Manager Parameter Store or Service Discovery
app.payment.endpoint=${PAYMENT_ENDPOINT:http://payment-service:9090/payments/charge}
app.inventory.endpoint=${INVENTORY_ENDPOINT:http://inventory-service:8081/rooms/available}
app.notification.endpoint=${NOTIFICATION_ENDPOINT:http://notification-service:7070/send}

# Cache Configuration
app.cache.ttl.minutes=${CACHE_TTL_MINUTES:30}

# Logging Configuration
logging.level.root=INFO
logging.level.com.demo.resortslite=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ResortsLite - Cloud-Native Configuration for GCP
spring.application.name=ResortsLite

# Dynamic port binding for cloud environments (Cloud Run, GKE)
server.port=${PORT:8080}

# Database configuration - externalized via environment variables
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:resortdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# Google Cloud Storage configuration for file operations
gcp.storage.bucket-name=${GCS_BUCKET_NAME:resorts-lite-reports}
gcp.storage.project-id=${GCP_PROJECT_ID:}

# Redis configuration for distributed session and cache (Memorystore for Redis)
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.ssl=${REDIS_SSL:false}

# Spring Session configuration
spring.session.store-type=redis
spring.session.redis.namespace=resortslite:session

# Cache configuration with TTL
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.cache.redis.cache-null-values=false

# External service endpoints - externalized via environment variables
app.payment.endpoint=${PAYMENT_SERVICE_URL:http://payment-svc.internal:9090/charge}
app.inventory.endpoint=${INVENTORY_SERVICE_URL:http://inventory-svc.internal:8081/rooms}
app.notification.endpoint=${NOTIFICATION_SERVICE_URL:http://notify.internal:7070/send}

# Google Secret Manager integration
spring.cloud.gcp.secretmanager.enabled=${SECRET_MANAGER_ENABLED:false}
spring.cloud.gcp.secretmanager.project-id=${GCP_PROJECT_ID:}

# ResortsLite - Cloud-Native Configuration for Azure
spring.application.name=ResortsLite

# Dynamic port assignment for cloud environments (Azure Container Apps, AKS)
server.port=${PORT:8080}

# Database configuration - externalized to environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:resortdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# Azure Blob Storage configuration
azure.storage.account-name=${AZURE_STORAGE_ACCOUNT_NAME:}
azure.storage.account-key=${AZURE_STORAGE_ACCOUNT_KEY:}
azure.storage.blob-endpoint=${AZURE_STORAGE_BLOB_ENDPOINT:}
azure.storage.container-name=${AZURE_STORAGE_CONTAINER_NAME:resort-reports}

# Azure Key Vault configuration
azure.keyvault.uri=${AZURE_KEYVAULT_URI:}
azure.keyvault.tenant-id=${AZURE_TENANT_ID:}
azure.keyvault.client-id=${AZURE_CLIENT_ID:}
azure.keyvault.client-secret=${AZURE_CLIENT_SECRET:}

# Azure App Configuration
azure.appconfiguration.endpoint=${AZURE_APPCONFIGURATION_ENDPOINT:}

# Azure Cache for Redis (Session Store)
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.ssl=${REDIS_SSL:true}
spring.session.store-type=redis
spring.session.redis.namespace=resortslite:session

# Azure Active Directory configuration
azure.activedirectory.tenant-id=${AZURE_AD_TENANT_ID:}
azure.activedirectory.client-id=${AZURE_AD_CLIENT_ID:}
azure.activedirectory.client-secret=${AZURE_AD_CLIENT_SECRET:}
azure.activedirectory.user-group.allowed-groups=${AZURE_AD_ALLOWED_GROUPS:}

# External service endpoints - externalized to Azure App Configuration
app.payment.endpoint=${PAYMENT_ENDPOINT:http://payment-svc:9090/charge}
app.inventory.endpoint=${INVENTORY_ENDPOINT:http://inventory-svc:8081/rooms}
app.notification.endpoint=${NOTIFICATION_ENDPOINT:http://notify-svc:7070/send}

# Report service configuration
app.report.server-port=${REPORT_SERVER_PORT:8080}

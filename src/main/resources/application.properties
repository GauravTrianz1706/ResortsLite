# ResortsLite - Cloud-Ready Configuration for GCP
spring.application.name=ResortsLite

# Server port - externalized to environment variable for dynamic assignment
server.port=${PORT:8080}

# Database Configuration - externalized to environment variables
# For GCP Cloud SQL, use: jdbc:postgresql://CLOUD_SQL_CONNECTION_NAME/DATABASE_NAME
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:resortdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DATABASE_USERNAME:sa}
# Password retrieved from GCP Secret Manager via Spring Cloud GCP
spring.datasource.password=${DATABASE_PASSWORD:}

# H2 Console (disable in production)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# Redis Configuration for Memorystore
# For GCP Memorystore: redis://MEMORYSTORE_IP:6379
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.timeout=2000ms

# Spring Session Configuration - use Redis for distributed sessions
spring.session.store-type=redis
spring.session.redis.namespace=spring:session
spring.session.timeout=30m

# Cache Configuration
cache.ttl.seconds=${CACHE_TTL_SECONDS:3600}

# Google Cloud Storage Configuration
gcs.bucket.reports=${GCS_REPORTS_BUCKET:resort-reports-bucket}
gcs.bucket.backups=${GCS_BACKUPS_BUCKET:resort-backups-bucket}

# GCP Project Configuration
spring.cloud.gcp.project-id=${GCP_PROJECT_ID:}
spring.cloud.gcp.credentials.location=${GCP_CREDENTIALS_LOCATION:}

# Secret Manager Configuration
spring.cloud.gcp.secretmanager.enabled=${SECRET_MANAGER_ENABLED:true}

# External Service Endpoints - externalized to environment variables
payment.api.url=${PAYMENT_API_URL:http://payment-service:9090/payments/charge}
inventory.service.url=${INVENTORY_SERVICE_URL:http://inventory-service:8081/rooms/available}
notification.service.url=${NOTIFICATION_SERVICE_URL:http://notification-service:7070/send}

# Database Configuration (for BookingService)
database.host=${DB_HOST:localhost}
database.username=${DB_USER:sa}
database.password=${DB_PASSWORD:}

# Logging Configuration for Cloud Logging
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.demo.resortslite=${APP_LOG_LEVEL:DEBUG}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

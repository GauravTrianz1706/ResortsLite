# ResortsLite - Cloud-Ready Configuration
spring.application.name=ResortsLite

# Dynamic port assignment for cloud environments (ECS/EKS/Elastic Beanstalk)
server.port=${SERVER_PORT:8080}

# Database configuration - externalized to environment variables
spring.datasource.url=${DB_URL:jdbc:h2:mem:resortdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# Cloud service endpoints - externalized to environment variables
app.payment.endpoint=${PAYMENT_ENDPOINT:http://payment-svc.internal:9090/charge}
app.inventory.endpoint=${INVENTORY_ENDPOINT:http://inventory-svc.internal:8081/rooms}
app.notification.endpoint=${NOTIFICATION_ENDPOINT:http://notify.internal:7070/send}

# AWS S3 Configuration for file storage
aws.s3.bucket.name=${AWS_S3_BUCKET_NAME:resorts-reports-bucket}
aws.s3.region=${AWS_REGION:us-east-1}

# AWS Secrets Manager Configuration
aws.secrets.db.secret.name=${AWS_DB_SECRET_NAME:resorts/db/credentials}
aws.secrets.auth.secret.name=${AWS_AUTH_SECRET_NAME:resorts/auth/credentials}

# AWS Systems Manager Parameter Store
aws.ssm.parameter.prefix=${AWS_SSM_PARAMETER_PREFIX:/resorts/config}

# Redis Configuration for distributed session management (ElastiCache)
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.session.store-type=redis
spring.session.redis.namespace=resorts:session
spring.session.timeout=1800

# Redis cache configuration with TTL
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000

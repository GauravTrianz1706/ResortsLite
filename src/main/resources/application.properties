# ResortsLite - Cloud-Native Configuration
spring.application.name=ResortsLite

# Cloud-native: Use environment variable for dynamic port assignment
server.port=${SERVER_PORT:8080}

# Cloud-native: Database configuration with HikariCP connection pooling
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:resortdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}

# HikariCP connection pool settings for cloud environments
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_POOL_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME:1800000}

spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# Cloud-native: Redis configuration for distributed session and cache management
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.ssl=${REDIS_SSL:false}
spring.redis.timeout=${REDIS_TIMEOUT:2000}

# Spring Session configuration for Redis-backed sessions
spring.session.store-type=redis
spring.session.redis.namespace=resortslite:session
spring.session.timeout=${SESSION_TIMEOUT:30m}

# Cache configuration
cache.ttl.minutes=${CACHE_TTL_MINUTES:30}

# Cloud-native: AWS configuration (retrieved from environment or IAM roles)
aws.region=${AWS_REGION:us-east-1}
aws.s3.reports.bucket=${REPORTS_BUCKET:resort-reports-bucket}
aws.secrets.database=${DB_SECRET_NAME:resortslite/database}
aws.secrets.auth=${AUTH_SECRET_NAME:resortslite/auth}

# Cloud-native: External service endpoints (retrieved from Parameter Store or environment)
app.payment.endpoint=${PAYMENT_API_ENDPOINT:http://payment-service:9090/charge}
app.inventory.endpoint=${INVENTORY_API_ENDPOINT:http://inventory-service:8081/rooms}
app.notification.endpoint=${NOTIFICATION_API_ENDPOINT:http://notification-service:7070/send}

# Logging configuration for cloud environments
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.demo.resortslite=${APP_LOG_LEVEL:DEBUG}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

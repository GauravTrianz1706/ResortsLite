# ResortsLite - Legacy Configuration
# VIOLATION cr-java-0021: Hardcoded infrastructure values in properties file
spring.application.name=ResortsLite

# VIOLATION czr-port-001 [Software Portability]: Fixed port prevents dynamic assignment by ECS/EKS
server.port=8080

# VIOLATION cr-java-0021 [Cloud Compatibility / Mandatory]: Hardcoded DB hostname and credentials.
# Must be externalised to AWS Parameter Store or Secrets Manager for cloud deployment.
spring.datasource.url=jdbc:h2:mem:resortdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# VIOLATION cr-java-0021 [Cloud Compatibility / Mandatory]: Hardcoded internal service endpoints.
# These hostnames are non-routable in cloud VPC environments without manual DNS configuration.
app.payment.endpoint=http://payment-svc.internal:9090/charge
app.inventory.endpoint=http://inventory-svc.internal:8081/rooms
app.notification.endpoint=http://notify.internal:7070/send

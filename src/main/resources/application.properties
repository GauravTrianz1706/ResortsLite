# ResortsLite - Cloud-Ready Configuration for GCP
spring.application.name=ResortsLite

# Server Configuration - Use environment variable for dynamic port assignment
server.port=${PORT:8080}

# Database Configuration - Externalized to environment variables and Secret Manager
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:resortdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

# H2 Console (disable in production)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# Google Cloud Platform Configuration
gcp.project.id=${GCP_PROJECT_ID:default-project}
gcp.storage.bucket.reports=${GCS_REPORTS_BUCKET:resort-reports-bucket}

# Secret Manager Configuration
database.host.secret=${DB_HOST_SECRET:db-host-secret}
database.user.secret=${DB_USER_SECRET:db-user-secret}
database.password.secret=${DB_PASSWORD_SECRET:db-password-secret}

# Redis Configuration for Memorystore
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.ssl=${REDIS_SSL:false}
spring.redis.timeout=${REDIS_TIMEOUT:2000}

# Session Management with Redis
spring.session.store-type=redis
spring.session.redis.namespace=spring:session
spring.session.timeout=${SESSION_TIMEOUT:30m}

# Cache Configuration
cache.ttl.minutes=${CACHE_TTL_MINUTES:30}

# External Service Endpoints - Externalized to environment variables
app.payment.endpoint=${PAYMENT_API_URL:http://payment-service:9090/payments/charge}
app.inventory.endpoint=${INVENTORY_API_URL:http://inventory-service:8081/rooms/available}
app.notification.endpoint=${NOTIFICATION_API_URL:http://notification-service:7070/send}

# Logging Configuration
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.demo.resortslite=${APP_LOG_LEVEL:DEBUG}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Cloud-native settings
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ResortsLite - Cloud-Native Configuration for GCP
spring.application.name=ResortsLite

# FIXED cr-java-0077: Dynamic port binding for cloud environments
# Uses PORT environment variable (standard for Cloud Run, App Engine)
server.port=${PORT:8080}

# FIXED cr-java-0069: Database configuration using environment variables
# These should be configured via GCP Secret Manager in production
spring.datasource.url=${DB_URL:jdbc:h2:mem:resortdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASS:}

spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# FIXED cr-java-0071: Externalized service endpoints using environment variables
app.payment.endpoint=${PAYMENT_API_URL:http://payment-service:9090/charge}
app.inventory.endpoint=${INVENTORY_SERVICE_URL:http://inventory-service:8081/rooms}
app.notification.endpoint=${NOTIFICATION_SERVICE_URL:http://notification-service:7070/send}

# FIXED cr-java-0061: GCS bucket configuration for file storage
gcp.storage.bucket.reports=${GCS_REPORTS_BUCKET:resort-reports-bucket}
gcp.storage.bucket.backups=${GCS_BACKUPS_BUCKET:resort-backups-bucket}

# FIXED cr-java-0065, cr-java-0067: Redis configuration for distributed session and cache
# Uses Memorystore for Redis in GCP
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.timeout=2000ms
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=0

# Spring Session configuration for Redis-backed sessions
spring.session.store-type=redis
spring.session.redis.namespace=spring:session
spring.session.timeout=30m

# Spring Cache configuration for Redis
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.cache.redis.cache-null-values=false

# GCP Secret Manager integration (Spring Cloud GCP)
spring.cloud.gcp.secretmanager.enabled=${GCP_SECRET_MANAGER_ENABLED:false}
spring.cloud.gcp.project-id=${GCP_PROJECT_ID:}

# Logging configuration for cloud environments
logging.level.root=INFO
logging.level.com.demo.resortslite=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

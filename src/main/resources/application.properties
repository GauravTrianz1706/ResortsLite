# ResortsLite - Cloud-Ready Configuration for GCP
spring.application.name=ResortsLite

# Dynamic port binding for cloud environments (Cloud Run, GKE)
server.port=${PORT:8080}

# Database configuration - externalized to environment variables
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:resortdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# HikariCP connection pool configuration
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME:1800000}

spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# Google Cloud Storage configuration
gcp.storage.bucket-name=${GCS_BUCKET_NAME:resorts-reports-bucket}
gcp.storage.project-id=${GCP_PROJECT_ID:}

# Google Secret Manager configuration
spring.cloud.gcp.secretmanager.enabled=${SECRET_MANAGER_ENABLED:true}
spring.cloud.gcp.secretmanager.project-id=${GCP_PROJECT_ID:}

# Redis configuration for distributed session management (Memorystore)
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.ssl=${REDIS_SSL:false}
spring.redis.timeout=${REDIS_TIMEOUT:2000}

# Spring Session configuration
spring.session.store-type=redis
spring.session.redis.flush-mode=on_save
spring.session.redis.namespace=spring:session
spring.session.timeout=${SESSION_TIMEOUT:1800}

# Redis cache configuration with TTL
spring.cache.type=redis
spring.cache.redis.time-to-live=${CACHE_TTL:3600000}
spring.cache.redis.cache-null-values=false

# External service endpoints - externalized to environment variables
app.payment.endpoint=${PAYMENT_SERVICE_URL:http://payment-svc:9090/charge}
app.inventory.endpoint=${INVENTORY_SERVICE_URL:http://inventory-svc:8081/rooms}
app.notification.endpoint=${NOTIFICATION_SERVICE_URL:http://notify-svc:7070/send}

# File authentication credentials path - externalized
app.auth.credentials.path=${AUTH_CREDENTIALS_PATH:}

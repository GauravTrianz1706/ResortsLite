# ResortsLite - Cloud-Ready Configuration for AWS
spring.application.name=ResortsLite

# Dynamic port assignment for cloud environments (ECS/EKS/Elastic Beanstalk)
server.port=${SERVER_PORT:8080}

# Database configuration - externalized to environment variables
spring.datasource.url=${DB_URL:jdbc:h2:mem:resortdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# HikariCP connection pool configuration for cloud environments
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME:1800000}

spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# AWS Configuration - externalized to environment variables
aws.region=${AWS_REGION:us-east-1}
aws.s3.bucket.name=${S3_BUCKET_NAME:resorts-lite-reports}
aws.secrets.db-credentials=${AWS_SECRET_DB_CREDENTIALS:resorts/db/credentials}
aws.secrets.auth-credentials=${AWS_SECRET_AUTH_CREDENTIALS:resorts/auth/credentials}

# AWS Systems Manager Parameter Store paths
aws.ssm.payment.endpoint=${AWS_SSM_PAYMENT_ENDPOINT:/resorts/config/payment-endpoint}
aws.ssm.inventory.endpoint=${AWS_SSM_INVENTORY_ENDPOINT:/resorts/config/inventory-endpoint}
aws.ssm.notification.endpoint=${AWS_SSM_NOTIFICATION_ENDPOINT:/resorts/config/notification-endpoint}
aws.ssm.server.port=${AWS_SSM_SERVER_PORT:/resorts/config/server-port}

# Service endpoints - externalized to environment variables
app.payment.endpoint=${PAYMENT_ENDPOINT:http://payment-svc:9090/charge}
app.inventory.endpoint=${INVENTORY_ENDPOINT:http://inventory-svc:8081/rooms}
app.notification.endpoint=${NOTIFICATION_ENDPOINT:http://notify-svc:7070/send}

# Redis configuration for distributed session management (Amazon ElastiCache)
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.ssl=${REDIS_SSL:false}
spring.redis.timeout=${REDIS_TIMEOUT:2000}

# Spring Session configuration
spring.session.store-type=redis
spring.session.redis.flush-mode=on_save
spring.session.redis.namespace=spring:session

# Redis cache configuration with TTL
spring.cache.type=redis
spring.cache.redis.time-to-live=${CACHE_TTL:3600000}
spring.cache.redis.cache-null-values=false

# AWS Cognito configuration for authentication
aws.cognito.userPoolId=${COGNITO_USER_POOL_ID:}
aws.cognito.clientId=${COGNITO_CLIENT_ID:}
aws.cognito.region=${COGNITO_REGION:us-east-1}

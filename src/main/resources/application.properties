# ResortsLite - Cloud-Ready Configuration for GCP
spring.application.name=ResortsLite

# Dynamic port binding for Cloud Run / GKE
server.port=${PORT:8080}

# Database configuration - externalized via environment variables
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:resortdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# Cloud service endpoints - externalized via environment variables
app.payment.endpoint=${PAYMENT_ENDPOINT:http://payment-svc:9090/charge}
app.inventory.endpoint=${INVENTORY_ENDPOINT:http://inventory-svc:8081/rooms}
app.notification.endpoint=${NOTIFICATION_ENDPOINT:http://notify-svc:7070/send}

# Google Cloud Storage configuration
gcp.storage.bucket-name=${GCS_BUCKET_NAME:resort-reports-bucket}
gcp.storage.project-id=${GCP_PROJECT_ID:}

# Google Secret Manager configuration
spring.cloud.gcp.secretmanager.enabled=${SECRET_MANAGER_ENABLED:false}
spring.cloud.gcp.secretmanager.project-id=${GCP_PROJECT_ID:}

# Redis configuration for distributed session management (Memorystore)
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.session.store-type=redis
spring.session.redis.namespace=resortslite:session

# Cache configuration with TTL
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=600s

# Authentication file path - externalized
app.auth.credentials-path=${AUTH_CREDENTIALS_PATH:/config/credentials}

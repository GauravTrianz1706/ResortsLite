# ResortsLite - Cloud-Ready Configuration for AWS
# All values externalized to support environment-specific deployments

spring.application.name=ResortsLite

# Server port - externalized to environment variable for dynamic assignment by ECS/EKS
server.port=${SERVER_PORT:8080}

# Database configuration - credentials managed by AWS Secrets Manager
spring.datasource.url=${DB_URL:jdbc:h2:mem:resortdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# H2 Console (disable in production)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# Redis configuration for distributed session and cache management (Amazon ElastiCache)
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.ssl=${REDIS_SSL:false}
spring.redis.timeout=${REDIS_TIMEOUT:2000}

# Spring Session configuration - use Redis for distributed sessions
spring.session.store-type=redis
spring.session.redis.namespace=resort:session
spring.session.timeout=${SESSION_TIMEOUT:3600}

# AWS Configuration
aws.region=${AWS_REGION:us-east-1}

# AWS S3 Configuration for file storage
aws.s3.report.bucket=${S3_REPORT_BUCKET:resort-reports-bucket}
aws.s3.backup.bucket=${S3_BACKUP_BUCKET:resort-backups-bucket}

# AWS Secrets Manager configuration
aws.secrets.database.name=${SECRETS_DB_NAME:resort-db-credentials}

# Application endpoints - externalized to AWS Systems Manager Parameter Store
app.payment.endpoint=${PAYMENT_ENDPOINT:http://payment-service:9090/payments/charge}
app.inventory.endpoint=${INVENTORY_ENDPOINT:http://inventory-service:8081/rooms/available}
app.notification.endpoint=${NOTIFICATION_ENDPOINT:http://notification-service:7070/send}

# Cache TTL configuration
app.cache.ttl.seconds=${CACHE_TTL_SECONDS:3600}

# Logging configuration for cloud environments
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.demo.resortslite=${APP_LOG_LEVEL:DEBUG}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

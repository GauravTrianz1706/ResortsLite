# ResortsLite - Cloud-Ready Configuration for GCP
spring.application.name=ResortsLite

# Server Configuration - Use environment variable for dynamic port assignment
server.port=${PORT:8080}

# Database Configuration - Externalized via environment variables
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:resortdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}

# H2 Console (disable in production)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# GCP Configuration
gcp.project.id=${GCP_PROJECT_ID:your-project-id}

# GCP Storage Buckets
gcp.storage.bucket.reports=${GCS_REPORTS_BUCKET:resort-reports-bucket}
gcp.storage.bucket.backups=${GCS_BACKUPS_BUCKET:resort-backups-bucket}

# GCP Secret Manager - Secret Names
gcp.secret.db-host=${SECRET_DB_HOST:db-host-secret}
gcp.secret.db-user=${SECRET_DB_USER:db-user-secret}
gcp.secret.db-password=${SECRET_DB_PASSWORD:db-password-secret}
gcp.secret.api-key=${SECRET_API_KEY:api-key-secret}

# Redis Configuration for Memorystore
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.ssl=${REDIS_SSL:false}
spring.redis.timeout=${REDIS_TIMEOUT:2000}

# Redis Connection Pool
spring.redis.lettuce.pool.max-active=${REDIS_POOL_MAX_ACTIVE:8}
spring.redis.lettuce.pool.max-idle=${REDIS_POOL_MAX_IDLE:8}
spring.redis.lettuce.pool.min-idle=${REDIS_POOL_MIN_IDLE:0}

# Session Management with Redis
spring.session.store-type=redis
spring.session.redis.namespace=spring:session
spring.session.timeout=${SESSION_TIMEOUT:30m}

# Cache Configuration
app.cache.ttl.minutes=${CACHE_TTL_MINUTES:30}

# External Service Endpoints - Externalized via environment variables
app.payment.endpoint=${PAYMENT_ENDPOINT:http://payment-service:9090/charge}
app.inventory.endpoint=${INVENTORY_ENDPOINT:http://inventory-service:8081/rooms}
app.notification.endpoint=${NOTIFICATION_ENDPOINT:http://notification-service:7070/send}

# Logging Configuration for Cloud
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.demo.resortslite=${APP_LOG_LEVEL:DEBUG}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Actuator for health checks (required for GCP Cloud Run/GKE)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.redis.enabled=true

# ResortsLite - Cloud-Ready Configuration for AWS
spring.application.name=ResortsLite

# Server Configuration - Use environment variable for dynamic port assignment
server.port=${SERVER_PORT:8080}

# Database Configuration - Externalized to environment variables
spring.datasource.url=${DB_URL:jdbc:h2:mem:resortdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# H2 Console (disable in production)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# Redis Configuration for session management and caching
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.timeout=${REDIS_TIMEOUT:2000}
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=0

# Spring Session Configuration - Use Redis for distributed sessions
spring.session.store-type=redis
spring.session.redis.namespace=resorts:session
spring.session.timeout=${SESSION_TIMEOUT:1800}

# Redis Cache Configuration
redis.cache.ttl.seconds=${CACHE_TTL_SECONDS:3600}

# AWS S3 Configuration
aws.s3.bucket.reports=${AWS_S3_REPORTS_BUCKET:resort-reports-bucket}
aws.s3.region=${AWS_REGION:us-east-1}

# AWS Secrets Manager Configuration
aws.secretsmanager.db.secret.name=${AWS_DB_SECRET_NAME:resorts-db-credentials}

# AWS Systems Manager Parameter Store Configuration
aws.ssm.parameter.prefix=${AWS_SSM_PARAMETER_PREFIX:/resorts/}

# Application Service Endpoints - Externalized to environment variables
app.payment.endpoint=${PAYMENT_SERVICE_ENDPOINT:http://payment-service:9090/payments/charge}
app.inventory.endpoint=${INVENTORY_SERVICE_ENDPOINT:http://inventory-service:8081/rooms/available}
app.notification.endpoint=${NOTIFICATION_SERVICE_ENDPOINT:http://notification-service:7070/send}

# Logging Configuration
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.demo.resortslite=${APP_LOG_LEVEL:DEBUG}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

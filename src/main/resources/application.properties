# ResortsLite - Cloud-Ready Configuration
spring.application.name=ResortsLite

# Server Configuration - Externalized for cloud environments
# Use environment variable SERVER_PORT or default to 8080
server.port=${SERVER_PORT:8080}

# Database Configuration - Externalized to environment variables
# In production, these should be retrieved from AWS Secrets Manager
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:resortdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# Redis Configuration for distributed session and cache management
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.timeout=${REDIS_TIMEOUT:2000}

# Spring Session Configuration
spring.session.store-type=redis
spring.session.redis.namespace=resort:session
spring.session.timeout=30m

# Redis Cache Configuration
redis.cache.ttl.seconds=${REDIS_CACHE_TTL:3600}

# AWS S3 Configuration - Externalized bucket names
aws.s3.reports.bucket=${AWS_S3_REPORTS_BUCKET:resort-reports-bucket}
aws.s3.backups.bucket=${AWS_S3_BACKUPS_BUCKET:resort-backups-bucket}

# AWS Secrets Manager Configuration
aws.secrets.database.name=${AWS_SECRET_DATABASE_NAME:resort-db-credentials}

# AWS Region Configuration
aws.region=${AWS_REGION:us-east-1}

# External Service Endpoints - Externalized for cloud service discovery
app.payment.endpoint=${PAYMENT_SERVICE_ENDPOINT:http://payment-service:9090/payments/charge}
app.inventory.endpoint=${INVENTORY_SERVICE_ENDPOINT:http://inventory-service:8081/rooms/available}
app.notification.endpoint=${NOTIFICATION_SERVICE_ENDPOINT:http://notification-service:7070/send}

# Logging Configuration
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.demo.resortslite=${APP_LOG_LEVEL:DEBUG}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

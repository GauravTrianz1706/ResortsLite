# ResortsLite - Cloud-Ready Configuration
spring.application.name=ResortsLite

# Server port - externalized to environment variable for cloud deployment
server.port=${SERVER_PORT:8080}

# Database configuration - externalized to environment variables
# These should be provided by AWS Secrets Manager or Parameter Store
spring.datasource.url=${DB_URL:jdbc:h2:mem:resortdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# External service endpoints - externalized to environment variables
# These should be provided by AWS Systems Manager Parameter Store
app.payment.endpoint=${PAYMENT_ENDPOINT:http://payment-svc:9090/charge}
app.inventory.endpoint=${INVENTORY_ENDPOINT:http://inventory-svc:8081/rooms}
app.notification.endpoint=${NOTIFICATION_ENDPOINT:http://notify-svc:7070/send}

# AWS S3 Configuration for file storage
aws.s3.bucket.name=${S3_BUCKET_NAME:resorts-lite-reports}
aws.s3.region=${AWS_REGION:us-east-1}

# AWS Secrets Manager Configuration
aws.secrets.db.secret.name=${DB_SECRET_NAME:resorts-lite/db/credentials}
aws.secrets.auth.secret.name=${AUTH_SECRET_NAME:resorts-lite/auth/credentials}

# AWS Systems Manager Parameter Store Configuration
aws.ssm.parameter.prefix=${SSM_PARAMETER_PREFIX:/resorts-lite}

# Redis Configuration for distributed session management (ElastiCache)
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.ssl=${REDIS_SSL:false}
spring.redis.timeout=${REDIS_TIMEOUT:2000}

# Spring Session Configuration
spring.session.store-type=redis
spring.session.redis.flush-mode=on_save
spring.session.redis.namespace=spring:session

# Redis Cache Configuration with TTL
spring.cache.type=redis
spring.cache.redis.time-to-live=${CACHE_TTL:3600000}
spring.cache.redis.cache-null-values=false

# ResortsLite - Cloud-Native Configuration
spring.application.name=ResortsLite

# Cloud-native: Use environment variable for dynamic port assignment
server.port=${SERVER_PORT:8080}

# Cloud-native: Database configuration with environment variables
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:resortdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

# HikariCP connection pool configuration for cloud environments
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME:1800000}

spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# Cloud-native: Redis configuration for ElastiCache
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.timeout=${REDIS_TIMEOUT:2000}
spring.redis.lettuce.pool.max-active=${REDIS_POOL_MAX_ACTIVE:8}
spring.redis.lettuce.pool.max-idle=${REDIS_POOL_MAX_IDLE:8}
spring.redis.lettuce.pool.min-idle=${REDIS_POOL_MIN_IDLE:0}

# Spring Session configuration for distributed session management
spring.session.store-type=redis
spring.session.redis.namespace=resort:session
spring.session.timeout=${SESSION_TIMEOUT:1800}

# Cloud-native: AWS configuration
aws.region=${AWS_REGION:us-east-1}
aws.s3.reports.bucket=${S3_REPORTS_BUCKET:resort-reports-bucket}
aws.secrets.database.name=${SECRETS_DATABASE_NAME:resort-db-credentials}
aws.secrets.payment.name=${SECRETS_PAYMENT_NAME:resort-payment-credentials}

# Cloud-native: Externalized service endpoints via AWS Parameter Store
app.payment.endpoint=${PAYMENT_ENDPOINT:http://payment-service:9090/charge}
app.inventory.endpoint=${INVENTORY_ENDPOINT:http://inventory-service:8081/rooms}
app.notification.endpoint=${NOTIFICATION_ENDPOINT:http://notification-service:7070/send}

# Cloud-native: Cache configuration
app.cache.ttl.minutes=${CACHE_TTL_MINUTES:30}

# Logging configuration for cloud environments (JSON format for CloudWatch)
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.demo.resortslite=${APP_LOG_LEVEL:DEBUG}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ResortsLite - Cloud-Ready Configuration
spring.application.name=ResortsLite

# Dynamic port assignment for cloud environments (Azure Container Apps, AKS)
server.port=${PORT:8080}

# Database configuration - externalized to environment variables
spring.datasource.url=${DB_URL:jdbc:h2:mem:resortdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# HikariCP connection pooling configuration
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME:1800000}

spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# Azure Blob Storage configuration for file operations
azure.storage.account-name=${AZURE_STORAGE_ACCOUNT_NAME:}
azure.storage.account-key=${AZURE_STORAGE_ACCOUNT_KEY:}
azure.storage.blob-endpoint=${AZURE_STORAGE_BLOB_ENDPOINT:}
azure.storage.container-name=${AZURE_STORAGE_CONTAINER_NAME:resort-reports}

# Azure Key Vault configuration for secrets management
azure.keyvault.uri=${AZURE_KEYVAULT_URI:}
azure.keyvault.tenant-id=${AZURE_TENANT_ID:}
azure.keyvault.client-id=${AZURE_CLIENT_ID:}
azure.keyvault.client-secret=${AZURE_CLIENT_SECRET:}

# Azure Active Directory configuration for authentication
azure.activedirectory.tenant-id=${AZURE_AD_TENANT_ID:}
azure.activedirectory.client-id=${AZURE_AD_CLIENT_ID:}
azure.activedirectory.client-secret=${AZURE_AD_CLIENT_SECRET:}
azure.activedirectory.user-group.allowed-groups=${AZURE_AD_ALLOWED_GROUPS:}

# Redis configuration for distributed session management
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.ssl=${REDIS_SSL:true}
spring.session.store-type=redis
spring.session.redis.flush-mode=on_save
spring.session.redis.namespace=spring:session

# Redis cache configuration with TTL
spring.cache.type=redis
spring.cache.redis.time-to-live=${CACHE_TTL:3600000}
spring.cache.redis.cache-null-values=false

# External service endpoints - externalized to environment variables
app.payment.endpoint=${PAYMENT_SERVICE_URL:http://payment-svc:9090/charge}
app.inventory.endpoint=${INVENTORY_SERVICE_URL:http://inventory-svc:8081/rooms}
app.notification.endpoint=${NOTIFICATION_SERVICE_URL:http://notify-svc:7070/send}

# Application-specific configuration
app.report.base-path=${REPORT_BASE_PATH:/tmp/reports}
app.backup.path=${BACKUP_PATH:/tmp/backups}

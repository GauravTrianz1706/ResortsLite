# ResortsLite - Cloud-Ready Configuration for AWS
spring.application.name=ResortsLite

# Server Configuration - Use environment variable for dynamic port assignment
server.port=${SERVER_PORT:8080}

# Database Configuration - Externalized to environment variables
# In production, these should be retrieved from AWS Secrets Manager
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:resortdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

# H2 Console (disable in production)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# Redis Configuration for Session Management and Caching
# Use AWS ElastiCache Redis endpoint
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.ssl=${REDIS_SSL:false}
spring.redis.timeout=${REDIS_TIMEOUT:2000}

# Spring Session Configuration
spring.session.store-type=redis
spring.session.redis.namespace=resort:session
spring.session.timeout=${SESSION_TIMEOUT:30m}

# Cache Configuration
app.cache.ttl.minutes=${CACHE_TTL_MINUTES:30}

# AWS Configuration
aws.region=${AWS_REGION:us-east-1}

# AWS S3 Configuration for Reports
aws.s3.reports.bucket=${S3_REPORTS_BUCKET:resort-reports-bucket}

# AWS Secrets Manager Configuration
aws.secrets.database.name=${SECRETS_DATABASE_NAME:resort-db-credentials}

# External Service Endpoints - Externalized to environment variables
# These should point to AWS service discovery endpoints or load balancers
app.payment.endpoint=${PAYMENT_ENDPOINT:http://payment-service:9090/payments/charge}
app.inventory.endpoint=${INVENTORY_ENDPOINT:http://inventory-service:8081/rooms/available}
app.notification.endpoint=${NOTIFICATION_ENDPOINT:http://notification-service:7070/send}

# Actuator Configuration for Health Checks
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.redis.enabled=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.demo.resortslite=DEBUG
logging.level.software.amazon.awssdk=WARN

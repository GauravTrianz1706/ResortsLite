# ResortsLite - Cloud-Ready Configuration for Azure
spring.application.name=ResortsLite

# Server Configuration - Externalized port for dynamic assignment
server.port=${PORT:8080}

# Database Configuration - Externalized with environment variables
spring.datasource.url=${DB_URL:jdbc:h2:mem:resortdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# HikariCP Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME:1800000}

# H2 Console (disable in production)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# Azure Blob Storage Configuration
azure.storage.connection-string=${AZURE_STORAGE_CONNECTION_STRING:}
azure.storage.container.reports=${AZURE_STORAGE_CONTAINER_REPORTS:reports}
azure.storage.container.backups=${AZURE_STORAGE_CONTAINER_BACKUPS:backups}

# Azure Key Vault Configuration
azure.keyvault.uri=${AZURE_KEYVAULT_URI:}
azure.keyvault.secret.db-host=${AZURE_KEYVAULT_SECRET_DB_HOST:db-host}
azure.keyvault.secret.db-user=${AZURE_KEYVAULT_SECRET_DB_USER:db-user}
azure.keyvault.secret.db-password=${AZURE_KEYVAULT_SECRET_DB_PASSWORD:db-password}

# Azure App Configuration
spring.cloud.azure.appconfiguration.enabled=${AZURE_APP_CONFIG_ENABLED:false}
spring.cloud.azure.appconfiguration.stores[0].endpoint=${AZURE_APP_CONFIG_ENDPOINT:}

# Azure Cache for Redis Configuration
spring.redis.host=${AZURE_REDIS_HOST:localhost}
spring.redis.port=${AZURE_REDIS_PORT:6379}
spring.redis.password=${AZURE_REDIS_PASSWORD:}
spring.redis.ssl=${AZURE_REDIS_SSL:true}
spring.redis.timeout=${AZURE_REDIS_TIMEOUT:2000}
azure.redis.enabled=${AZURE_REDIS_ENABLED:false}
azure.redis.ttl.seconds=${AZURE_REDIS_TTL_SECONDS:3600}

# Azure Active Directory Configuration
spring.cloud.azure.active-directory.enabled=${AZURE_AD_ENABLED:false}
spring.cloud.azure.active-directory.profile.tenant-id=${AZURE_AD_TENANT_ID:}
spring.cloud.azure.active-directory.credential.client-id=${AZURE_AD_CLIENT_ID:}
spring.cloud.azure.active-directory.credential.client-secret=${AZURE_AD_CLIENT_SECRET:}

# External Service Endpoints - Externalized for environment-specific configuration
app.payment.endpoint=${PAYMENT_SERVICE_URL:http://localhost:9090/payments/charge}
app.inventory.endpoint=${INVENTORY_SERVICE_URL:http://localhost:8081/rooms/available}
app.notification.endpoint=${NOTIFICATION_SERVICE_URL:http://localhost:7070/send}

# Logging Configuration - Structured logging for cloud monitoring
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.demo.resortslite=${LOG_LEVEL_APP:DEBUG}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Actuator for health checks and monitoring
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.redis.enabled=${AZURE_REDIS_ENABLED:false}

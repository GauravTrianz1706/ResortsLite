# ResortsLite - Cloud-Ready Configuration
spring.application.name=ResortsLite

# FIXED cr-java-0077: Dynamic port assignment for cloud environments
server.port=${SERVER_PORT:8080}

# FIXED cr-java-0069: Database credentials externalized to environment variables
# These should be populated from AWS Secrets Manager in production
spring.datasource.url=${DB_URL:jdbc:h2:mem:resortdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# FIXED cr-java-0071: Service endpoints externalized to AWS Parameter Store
# These should be retrieved from AWS Systems Manager Parameter Store
app.payment.endpoint=${PAYMENT_ENDPOINT:http://payment-svc:9090/charge}
app.inventory.endpoint=${INVENTORY_ENDPOINT:http://inventory-svc:8081/rooms}
app.notification.endpoint=${NOTIFICATION_ENDPOINT:http://notify-svc:7070/send}

# FIXED cr-java-0065: Redis configuration for distributed session management
# ElastiCache Redis endpoint should be provided via environment variable
spring.session.store-type=redis
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.session.redis.namespace=resortslite:session

# FIXED cr-java-0067: Redis cache configuration with TTL
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000

# AWS Configuration
# S3 bucket for file storage (replaces local file system)
aws.s3.bucket=${S3_BUCKET_NAME:resortslite-reports}
aws.s3.region=${AWS_REGION:us-east-1}

# AWS Secrets Manager configuration
aws.secrets.region=${AWS_REGION:us-east-1}
aws.secrets.db-credentials=${DB_SECRET_NAME:resortslite/db/credentials}

# AWS Systems Manager Parameter Store
aws.ssm.region=${AWS_REGION:us-east-1}
